server:
  port: 8090

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: jedis-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/jedis/**

            - id: sables-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/sables/**
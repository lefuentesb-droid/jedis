spring.application.name=jedis
server.port=8081


# Configuración de Base de Datos (MySQL) 
#CONECTOR A BASE DE DATOS MYSQL 


#url de conexion a mysql / dividos por partes / 
spring.datasource.url=jdbc:mysql://localhost:3306/db_imperio_jedi?createDatabaseIfNotExist=true

#usuario el cual ocuparemos en my sql en este caso seria ROOT 
spring.datasource.username=root
## CONTRASEÑA PARA EL USUARIO rooot 
spring.datasource.password=
#le dice que driver usar (es como un traductor entre java y mysql )
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver


# JPA / Hibernate - Con Flyway desactivamos la creación automática de Hibernate
#ESTA PARTE CONTROLA COMO JAVA SE RELACIONA CON LÑAS TABLÑAS DE LA BASE DE DATOS 

#EVITA QUE LA HIBERNATE SE META A MODIFICAR LA BASE DE DATOS AUTOMATICAMENTE 
spring.jpa.hibernate.ddl-auto=none
#NOS AYUDA A QUE MUESTRE EN CONSOLA LAS CONSULTAS SQL QUE EJECUTA 
spring.jpa.show-sql=true


# Activación de Flyway
#Flyway revisa una carpeta especial del proyecto
spring.flyway.enabled=true

#Si Flyway encuentra una base de datos que ya existe y no tiene historial de Flyway,
#crea un punto inicial para empezar a manejarla.
spring.flyway.baseline-on-migrate=true


#1. Spring Boot inicia.
#2. Lee application.properties.
#3. Ve que debe correr en puerto 8081.
#4. Intenta conectarse a MySQL en localhost:3306.
#5. Busca la base db_imperio_jedi.
#6. Si no existe, intenta crearla.
#7. Activa Flyway.
#8. Flyway busca scripts SQL en db/migration.
#9. Flyway ejecuta las migraciones pendientes.
#10. Hibernate/JPA queda disponible para consultar, insertar, actualizar y eliminar datos.
#11. La aplicación queda lista para recibir peticiones.